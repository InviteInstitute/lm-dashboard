# Cloudflare Tunnel ingress for the LM dashboard.
#
# Copy this to deploy/cloudflared-config.yml (gitignored) and fill in your tunnel
# id, credentials path, and hostname. See docs/remote-access.md for the full
# one-time setup (creating the tunnel, the DNS route, and the Access policy).

tunnel: <YOUR_TUNNEL_ID>
credentials-file: /Users/<you>/.cloudflared/<YOUR_TUNNEL_ID>.json

ingress:
  # Everything for this hostname goes to the local API, which serves both the
  # built UI (/) and the data API (/api) on loopback only.
  - hostname: dash.yourdomain.com
    service: http://127.0.0.1:8000
  # Required catch-all: anything else gets a 404 instead of being proxied.
  - service: http_status:404
