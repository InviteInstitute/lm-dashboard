name: Deploy docs

# Rebuild and publish the MkDocs site to GitHub Pages on every push to main
# that touches the docs (or this workflow). Replaces running `mkdocs gh-deploy`
# by hand.
on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "mkdocs.yml"
      - ".github/workflows/docs.yml"
  workflow_dispatch: {}

permissions:
  contents: write   # gh-deploy pushes the built site to the gh-pages branch

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install mkdocs-material
      - run: mkdocs gh-deploy --force
